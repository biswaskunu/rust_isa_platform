<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>IAM platform architecture</title>
<desc>A client sends HTTP requests to an Axum router, which passes them through auth middleware, into handler modules, which talk to a PostgreSQL database.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="420" fill="#FFFFFF"/>

<g>
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
</g>
<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="240" y="100" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Axum router</text>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#185FA5">Routes HTTP requests</text>
</g>
<line x1="340" y1="156" x2="340" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="220" y="192" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="210" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">AuthenticatedUser middleware</text>
  <text x="340" y="228" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#185FA5">Validates JWT access token</text>
</g>
<line x1="340" y1="248" x2="340" y2="284" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="50" y="284" width="580" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Handlers: auth, org, rbac, api_key</text>
  <text x="340" y="320" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#534AB7">Business logic and authorization checks</text>
</g>
<line x1="340" y1="340" x2="340" y2="376" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="220" y="376" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">PostgreSQL (via SQLx)</text>
</g>
</svg>
