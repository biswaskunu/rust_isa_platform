<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>IAM platform entity relationship diagram</title>
<desc>Ten tables: users, organizations, memberships, roles, permissions, role_permissions, member_roles, sessions, api_keys, and audit_logs, connected by foreign keys.</desc>
<rect width="1000" height="700" fill="#FFFFFF"/>

<defs>
  <marker id="erd-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.2"/>
  </marker>
</defs>

<style>
  .tbl-header { fill: #E6F1FB; }
  .tbl-border { fill: none; stroke: #185FA5; stroke-width: 1; }
  .tbl-row { fill: #FAFAF8; stroke: #D3D1C7; stroke-width: 0.5; }
  .tbl-title { font-size: 13px; font-weight: bold; fill: #0C447C; }
  .tbl-field { font-size: 11px; fill: #2C2C2A; }
  .tbl-pk { font-size: 11px; fill: #993C1D; font-weight: bold; }
  .rel-line { stroke: #73726c; stroke-width: 1; fill: none; }
  .rel-label { font-size: 10px; fill: #5F5E5A; }
</style>

<!-- USERS -->
<g>
  <rect x="40" y="40" width="180" height="100" class="tbl-border"/>
  <rect x="40" y="40" width="180" height="26" class="tbl-header"/>
  <text x="50" y="58" class="tbl-title">USERS</text>
  <line x1="40" y1="66" x2="220" y2="66" stroke="#185FA5" stroke-width="0.5"/>
  <text x="50" y="82" class="tbl-pk">PK id</text>
  <text x="50" y="98" class="tbl-field">email</text>
  <text x="50" y="114" class="tbl-field">password_hash</text>
  <text x="50" y="130" class="tbl-field">created_at</text>
</g>

<!-- ORGANIZATIONS -->
<g>
  <rect x="760" y="40" width="180" height="74" class="tbl-border"/>
  <rect x="760" y="40" width="180" height="26" class="tbl-header"/>
  <text x="770" y="58" class="tbl-title">ORGANIZATIONS</text>
  <line x1="760" y1="66" x2="940" y2="66" stroke="#185FA5" stroke-width="0.5"/>
  <text x="770" y="82" class="tbl-pk">PK id</text>
  <text x="770" y="98" class="tbl-field">name</text>
</g>

<!-- MEMBERSHIPS -->
<g>
  <rect x="400" y="220" width="180" height="100" class="tbl-border"/>
  <rect x="400" y="220" width="180" height="26" class="tbl-header"/>
  <text x="410" y="238" class="tbl-title">MEMBERSHIPS</text>
  <line x1="400" y1="246" x2="580" y2="246" stroke="#185FA5" stroke-width="0.5"/>
  <text x="410" y="262" class="tbl-pk">PK id</text>
  <text x="410" y="278" class="tbl-field">FK user_id</text>
  <text x="410" y="294" class="tbl-field">FK organization_id</text>
  <text x="410" y="310" class="tbl-field">created_at</text>
</g>

<!-- ROLES -->
<g>
  <rect x="760" y="220" width="180" height="100" class="tbl-border"/>
  <rect x="760" y="220" width="180" height="26" class="tbl-header"/>
  <text x="770" y="238" class="tbl-title">ROLES</text>
  <line x1="760" y1="246" x2="940" y2="246" stroke="#185FA5" stroke-width="0.5"/>
  <text x="770" y="262" class="tbl-pk">PK id</text>
  <text x="770" y="278" class="tbl-field">FK organization_id</text>
  <text x="770" y="294" class="tbl-field">name</text>
</g>

<!-- PERMISSIONS -->
<g>
  <rect x="760" y="400" width="180" height="74" class="tbl-border"/>
  <rect x="760" y="400" width="180" height="26" class="tbl-header"/>
  <text x="770" y="418" class="tbl-title">PERMISSIONS</text>
  <line x1="760" y1="426" x2="940" y2="426" stroke="#185FA5" stroke-width="0.5"/>
  <text x="770" y="442" class="tbl-pk">PK id</text>
  <text x="770" y="458" class="tbl-field">name</text>
</g>

<!-- ROLE_PERMISSIONS -->
<g>
  <rect x="760" y="540" width="180" height="74" class="tbl-border"/>
  <rect x="760" y="540" width="180" height="26" class="tbl-header"/>
  <text x="770" y="558" class="tbl-title">ROLE_PERMISSIONS</text>
  <line x1="760" y1="566" x2="940" y2="566" stroke="#185FA5" stroke-width="0.5"/>
  <text x="770" y="582" class="tbl-field">FK role_id</text>
  <text x="770" y="598" class="tbl-field">FK permission_id</text>
</g>

<!-- MEMBER_ROLES -->
<g>
  <rect x="400" y="400" width="180" height="74" class="tbl-border"/>
  <rect x="400" y="400" width="180" height="26" class="tbl-header"/>
  <text x="410" y="418" class="tbl-title">MEMBER_ROLES</text>
  <line x1="400" y1="426" x2="580" y2="426" stroke="#185FA5" stroke-width="0.5"/>
  <text x="410" y="442" class="tbl-field">FK membership_id</text>
  <text x="410" y="458" class="tbl-field">FK role_id</text>
</g>

<!-- SESSIONS -->
<g>
  <rect x="40" y="220" width="180" height="116" class="tbl-border"/>
  <rect x="40" y="220" width="180" height="26" class="tbl-header"/>
  <text x="50" y="238" class="tbl-title">SESSIONS</text>
  <line x1="40" y1="246" x2="220" y2="246" stroke="#185FA5" stroke-width="0.5"/>
  <text x="50" y="262" class="tbl-pk">PK id</text>
  <text x="50" y="278" class="tbl-field">FK user_id</text>
  <text x="50" y="294" class="tbl-field">token_hash</text>
  <text x="50" y="310" class="tbl-field">refresh_token_hash</text>
  <text x="50" y="326" class="tbl-field">expires_at</text>
</g>

<!-- API_KEYS -->
<g>
  <rect x="40" y="400" width="180" height="100" class="tbl-border"/>
  <rect x="40" y="400" width="180" height="26" class="tbl-header"/>
  <text x="50" y="418" class="tbl-title">API_KEYS</text>
  <line x1="40" y1="426" x2="220" y2="426" stroke="#185FA5" stroke-width="0.5"/>
  <text x="50" y="442" class="tbl-pk">PK id</text>
  <text x="50" y="458" class="tbl-field">FK user_id</text>
  <text x="50" y="474" class="tbl-field">key_hash</text>
  <text x="50" y="490" class="tbl-field">name</text>
</g>

<!-- AUDIT_LOGS -->
<g>
  <rect x="40" y="560" width="180" height="100" class="tbl-border"/>
  <rect x="40" y="560" width="180" height="26" class="tbl-header"/>
  <text x="50" y="578" class="tbl-title">AUDIT_LOGS</text>
  <line x1="40" y1="586" x2="220" y2="586" stroke="#185FA5" stroke-width="0.5"/>
  <text x="50" y="602" class="tbl-pk">PK id</text>
  <text x="50" y="618" class="tbl-field">FK actor_id</text>
  <text x="50" y="634" class="tbl-field">action</text>
  <text x="50" y="650" class="tbl-field">resource</text>
</g>

<!-- Relationship lines -->
<!-- USERS -> MEMBERSHIPS -->
<path d="M 220 90 L 300 90 L 300 270 L 398 270" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="305" y="262" class="rel-label">has</text>

<!-- ORGANIZATIONS -> MEMBERSHIPS -->
<path d="M 850 114 L 850 270 L 582 270" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="700" y="262" class="rel-label">has</text>

<!-- ORGANIZATIONS -> ROLES -->
<line x1="850" y1="114" x2="850" y2="218" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="858" y="170" class="rel-label">defines</text>

<!-- MEMBERSHIPS -> MEMBER_ROLES -->
<line x1="490" y1="320" x2="490" y2="398" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="498" y="362" class="rel-label">has</text>

<!-- ROLES -> MEMBER_ROLES -->
<path d="M 760 280 L 660 280 L 660 437 L 582 437" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="665" y="272" class="rel-label">has</text>

<!-- ROLES -> ROLE_PERMISSIONS -->
<line x1="850" y1="320" x2="850" y2="398" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="858" y="362" class="rel-label">has</text>

<!-- PERMISSIONS -> ROLE_PERMISSIONS -->
<line x1="850" y1="474" x2="850" y2="538" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="858" y="510" class="rel-label">has</text>

<!-- USERS -> SESSIONS -->
<line x1="130" y1="140" x2="130" y2="218" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="138" y="182" class="rel-label">has</text>

<!-- USERS -> API_KEYS -->
<path d="M 40 100 L 22 100 L 22 440 L 38 440" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="2" y="270" class="rel-label">has</text>

<!-- USERS -> AUDIT_LOGS -->
<path d="M 40 116 L 6 116 L 6 600 L 38 600" class="rel-line" marker-end="url(#erd-arrow)"/>
<text x="2" y="360" class="rel-label">performs</text>
</svg>
