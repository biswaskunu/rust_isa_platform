<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Authentication and token refresh flow</title>
<desc>User logs in with email and password, receives access and refresh tokens, uses the access token on protected routes until it expires, then uses the refresh token to get a new pair.</desc>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="560" fill="#FFFFFF"/>

<g>
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">POST /auth/login</text>
</g>
<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<g>
  <rect x="190" y="100" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Verify bcrypt password hash</text>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#185FA5">401 if invalid</text>
</g>
<line x1="340" y1="156" x2="340" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<g>
  <rect x="160" y="192" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="210" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Issue access token (15m) + refresh token (7d)</text>
  <text x="340" y="228" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0F6E56">Both stored as SHA-256 hashes in sessions</text>
</g>
<line x1="340" y1="248" x2="340" y2="284" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<g>
  <rect x="160" y="284" width="360" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Client sends access token on each request</text>
  <text x="340" y="320" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#534AB7">Authorization: Bearer token</text>
</g>
<line x1="340" y1="340" x2="340" y2="376" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<g>
  <rect x="160" y="376" width="360" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Middleware validates signature, expiry, type</text>
  <text x="340" y="412" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#534AB7">Rejects refresh tokens on protected routes</text>
</g>

<line x1="280" y1="432" x2="280" y2="468" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
<text x="280" y="450" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">valid</text>

<line x1="430" y1="432" x2="430" y2="468" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
<text x="430" y="450" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">expired</text>

<g>
  <rect x="160" y="468" width="240" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="280" y="490" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#27500A">Handler runs normally</text>
</g>

<g>
  <rect x="380" y="468" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="490" y="486" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#633806">POST /auth/refresh</text>
  <text x="490" y="504" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#854F0B">Rotates token pair</text>
</g>
</svg>
